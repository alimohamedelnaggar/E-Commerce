<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Detail — TechStore</title>
  <meta name="description" content="View product details, specs and reviews on TechStore." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/pages/product-detail.css" />
</head>

<body>
  <!-- NAVBAR -->
  <header class="navbar" data-navbar>
    <div class="nav-container">
      <a href="index.html" class="logo" aria-label="TechStore home">
        <span class="logo-mark" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
        </span>
        <span class="logo-text">TechStore</span>
      </a>
      <div class="search-box" role="search">
        <label class="visually-hidden" for="nav-search">Search products</label>
        <input id="nav-search" type="search" name="q" placeholder="Search products…" autocomplete="off" />
        <span class="search-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
        </span>
      </div>
      <nav class="nav-actions" id="nav-menu" aria-label="Main">
        <a href="index.html" class="nav-link">
          Home
        </a>
        <a href="product.html" class="nav-link">
          Products
        </a>
        <a href="cart.html" class="nav-link nav-cart">
          <svg class="nav-link-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
          Cart
          <span class="cart-badge" data-cart-count="0" aria-label="Items in cart">0</span>
        </a>
        <div class="nav-auth">
          <a href="login.html" class="nav-btn nav-btn--ghost">Log in</a>
          <a href="register.html" class="nav-btn nav-btn--primary">Register</a>
        </div>
      </nav>
      <button type="button" class="menu-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Open menu">
        <span class="menu-toggle-bars" aria-hidden="true"></span>
      </button>
    </div>
    <div class="nav-backdrop" data-nav-backdrop hidden aria-hidden="true"></div>
  </header>

  <main id="pd-main">
    <!-- Content injected by JS -->
    <div class="pd-loading" id="pd-loading" aria-live="polite">
      <div class="pd-spinner" aria-hidden="true"></div>
      <p>Loading product…</p>
    </div>
  </main>

  <!-- Related products section injected below main by JS -->

  <script type="module" src="src/pages/product-detail.js"></script>
</body>

</html>
