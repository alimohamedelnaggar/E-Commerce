<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account — TechStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/pages/auth.css" />
</head>
<body>
  
  <header class="auth-header">
    <a href="index.html" class="auth-logo" aria-label="TechStore home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      TechStore
    </a>
  </header>

  <main class="auth-layout">
    <div class="auth-card">
      <h1 class="auth-title">Create an account</h1>
      <p class="auth-sub">Join TechStore to shop faster and track your orders.</p>

      <div class="auth-error" id="auth-error">Error.</div>

      <form class="auth-form" id="register-form">
        <div class="auth-field">
          <label class="auth-label" for="reg-name">Full name</label>
          <input class="auth-input" type="text" id="reg-name" required placeholder="John Doe" />
        </div>
        
        <div class="auth-field">
          <label class="auth-label" for="reg-email">Email address</label>
          <input class="auth-input" type="email" id="reg-email" required placeholder="name@example.com" />
        </div>
        
        <div class="auth-field">
          <label class="auth-label" for="reg-pass">Password</label>
          <input class="auth-input" type="password" id="reg-pass" required placeholder="At least 6 characters" minlength="6" />
        </div>
        
        <button type="submit" class="auth-submit" id="auth-submit-btn">Create account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <script type="module" src="src/pages/auth.js"></script>
</body>
</html>
